name: Release

on:
  push:
    branches:
      - main
    paths:
      - "package.json"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Pack and attach release asset
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check
        run: bun run check

      - name: Test
        run: bun test

      - name: Pack package
        id: pack
        run: |
          packed="$(bun pm pack --quiet --ignore-scripts | tail -n 1)"
          
          if [ -z "$packed" ]; then
            echo "Failed to pack: no output from bun pm pack" >&2
            exit 1
          fi
          
          echo "asset=$packed" >> "$GITHUB_OUTPUT"

      - name: Get version for release
        id: version
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Create or update release
        run: |
          tag="v${{ steps.version.outputs.version }}"
          
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release delete "$tag" --yes
          fi
          
          gh release create "$tag" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload package asset
        run: gh release upload "v${{ steps.version.outputs.version }}" "${{ steps.pack.outputs.asset }}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
