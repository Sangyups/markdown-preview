<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Markdown Preview</title>
    <link
      rel="stylesheet"
      href="./preview.css"
    />
  </head>
  <body>
    <main class="app-shell">
      <section
        aria-label="Find in preview"
        class="search-panel"
        hidden
        id="search-panel"
      >
        <label
          class="search-label"
          for="search-input"
        >
          Find
        </label>
        <input
          autocomplete="off"
          class="search-input"
          id="search-input"
          spellcheck="false"
          type="search"
        />
        <output
          aria-live="polite"
          class="search-count"
          id="search-count"
        >0/0</output>
        <button
          aria-label="Previous match"
          class="search-button"
          id="search-previous"
          title="Previous match"
          type="button"
        >
          ↑
        </button>
        <button
          aria-label="Next match"
          class="search-button"
          id="search-next"
          title="Next match"
          type="button"
        >
          ↓
        </button>
        <button
          aria-label="Close search"
          class="search-button"
          id="search-close"
          title="Close search"
          type="button"
        >
          ×
        </button>
      </section>
      <header class="app-header">
        <p class="app-kicker">Markdown Preview</p>
        <h1
          class="app-title"
          id="file-name"
        >
          Loading…
        </h1>
        <p
          class="app-path"
          id="file-path"
        ></p>
      </header>
      <article
        class="preview markdown-body"
        id="preview"
      ></article>
    </main>
    <script
      type="module"
      src="./index.js"
    ></script>
  </body>
</html>
